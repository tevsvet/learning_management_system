spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/lms
    username: admin
    password: admin
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    url: /api-docs
    config-url: /api-docs/swagger-config
    operations-sorter: method